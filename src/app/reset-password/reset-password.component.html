<div class="login-wrapper">

  <!-- ===================== LEFT PANEL ===================== -->
  <div class="left-panel">
    <img
      class="panel-image"
      src="assets/LoginPagePhoto.png"
      alt="VEXARO - Delivering Trust, Connecting the World"
    />
  </div>

  <!-- ===================== RIGHT PANEL ===================== -->
  <div class="right-panel">

    <!-- Language Selector -->
    <div class="lang-selector">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="#374151" stroke-width="1.5"/>
        <line x1="3.5" y1="7" x2="20.5" y2="7" stroke="#374151" stroke-width="1"/>
        <line x1="3.5" y1="17" x2="20.5" y2="17" stroke="#374151" stroke-width="1"/>
      </svg>
      <span>English</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 9l6 6 6-6" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Form Container -->
    <div class="form-container">
      <div class="form-header">
        <h2>Reset Password</h2>
        <p>Create a new secure password for your account.</p>
      </div>

      @if (!isSubmitted) {
      <form (ngSubmit)="onSubmit()" novalidate>

        <!-- New Password -->
        <div class="field-group">
          <label for="password">New Password</label>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              placeholder="Enter new password"
              [(ngModel)]="password"
            />
            <button type="button" class="eye-btn" (click)="togglePassword()">
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                  <circle cx="12" cy="12" r="3" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="confirmPassword"
              [type]="showPassword() ? 'text' : 'password'"
              name="confirmPassword"
              placeholder="Confirm new password"
              [(ngModel)]="confirmPassword"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-btn">Update Password</button>
      </form>
      } @else {
        <div class="success-message">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 4L12 14.01l-3-3" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h3>Password Updated</h3>
          <p>Your password has been successfully reset. You can now login with your new credentials.</p>
          <br>
          <button routerLink="/login" class="login-btn">Go to Login</button>
        </div>
      }

      @if (!isSubmitted) {
        <!-- Options Row -->
        <div class="form-options center-options">
          <a routerLink="/login" class="forgot-link">← Back to Login</a>
        </div>
      }

    </div>
  </div>
</div>
