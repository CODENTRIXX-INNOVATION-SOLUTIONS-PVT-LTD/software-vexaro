<div class="layout dashboard-shell">

  <!-- Mobile Top Header (Visible only on <1024px) -->
  <div class="mobile-header">
    <div class="logo-container-mobile">
      <img src="../../../assets/logo.png" alt="Vexaro Logo">
    </div>
    <button type="button" class="mobile-menu-btn" (click)="sidebar.toggleDrawer()" aria-label="Open dashboard menu">
      <span class="material-icons">menu</span>
    </button>
  </div>

  <app-sidebar #sidebar
    title="Distributor"
    [menuItems]="menuItems">
  </app-sidebar>

  <div class="content">
        <router-outlet></router-outlet>
    </div>

</div>
