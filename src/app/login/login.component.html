<div class="login-wrapper">

  <!-- ===================== LEFT PANEL ===================== -->
  <div class="left-panel">
    <img
      class="panel-image"
      src="assets/LoginPagePhoto.png"
      alt="VEXARO - Delivering Trust, Connecting the World"
    />
  </div>

  <!-- ===================== RIGHT PANEL ===================== -->
  <div class="right-panel">

    <!-- Language Selector -->
    <div class="lang-selector">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="#374151" stroke-width="1.5"/>
        <line x1="3.5" y1="7" x2="20.5" y2="7" stroke="#374151" stroke-width="1"/>
        <line x1="3.5" y1="17" x2="20.5" y2="17" stroke="#374151" stroke-width="1"/>
      </svg>
      <span>English</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 9l6 6 6-6" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Form Container -->
    <div class="form-container">
      <div class="form-header">
        <h2>Welcome Back!</h2>
        <p>Sign in to continue to your account</p>
      </div>

      <form (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label for="email">Email Address</label>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                <polyline points="22,6 12,13 2,6" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="Enter your email address"
              [(ngModel)]="email"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              placeholder="Enter your password"
              [(ngModel)]="password"
              autocomplete="current-password"
            />
            <button type="button" class="eye-btn" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                  <circle cx="12" cy="12" r="3" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Options Row -->
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" [(ngModel)]="rememberMe" />
            <span class="checkmark"></span>
            <span>Remember Me</span>
          </label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>

                <!-- Role Selector -->
        <div class="role-section">
          <h3>Select your role</h3>
          <div class="role-grid">
            <button
              type="button"
              class="role-card"
              [class.active]="selectedRole() === 'super-admin'"
              (click)="selectRole('super-admin')"
            >
              <div class="role-icon role-icon--blue">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="currentColor"/>
                  <path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <strong>Super Admin</strong>
              <span>System Administrator</span>
            </button>

            <button
              type="button"
              class="role-card"
              [class.active]="selectedRole() === 'merchant'"
              (click)="selectRole('merchant')"
            >
              <div class="role-icon role-icon--orange">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <polyline points="9,22 9,12 15,12 15,22" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <rect x="6" y="13" width="3" height="3" rx="0.5" fill="currentColor"/>
                  <rect x="15" y="13" width="3" height="3" rx="0.5" fill="currentColor"/>
                </svg>
              </div>
              <strong>Merchant</strong>
              <span>Manage Shipments</span>
            </button>

            <button
              type="button"
              class="role-card"
              [class.active]="selectedRole() === 'distributor'"
              (click)="selectRole('distributor')"
            >
              <div class="role-icon role-icon--green">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="18.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <circle cx="5.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <path d="M8 17.5h7M15 6H9l-1.5 6h10L15 6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M9 6l-2 5.5M15 6l2 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M3 9h2M19 9h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </div>
              <strong>Distributor</strong>
              <span>Manage Deliveries</span>
            </button>

            <button
              type="button"
              class="role-card"
              [class.active]="selectedRole() === 'warehouse'"
              (click)="selectRole('warehouse')"
            >
              <div class="role-icon role-icon--purple">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <rect x="9" y="14" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                  <line x1="9" y1="17" x2="15" y2="17" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </div>
              <strong>Warehouse</strong>
              <span>Warehouse Operations</span>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn">Login</button>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">or continue with</span>
          <span class="divider-line"></span>
        </div>

        <!-- Social Buttons -->
        <div class="social-btns">
          <button type="button" class="social-btn google-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
          </button>

          <button type="button" class="social-btn microsoft-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M11.4 2H2v9.4h9.4V2z" fill="#f25022"/>
              <path d="M22 2h-9.4v9.4H22V2z" fill="#7fba00"/>
              <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00a4ef"/>
              <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#ffb900"/>
            </svg>
            <span>Continue with Microsoft</span>
          </button>
        </div>
        <p class="muted">Don't have an account? <a routerLink="/register">Sign up</a></p>
      </form>
    </div>
  </div>
</div>
