<div class="auth-wrapper">
  <aside class="left-panel">
    <div class="illustration-container">
      <img
        src="assets/LoginPagePhoto.png"
        alt="Vexaro Operations"
        class="left-panel-img"
      />
    </div>
  </aside>

  <main class="right-panel">
    <div class="form-wrap">
      <a routerLink="/" class="brand brand--mobile">
        <span class="brand-icon">v</span>
        <span class="brand-name">Vexaro</span>
      </a>

      <header class="form-header">
        <h1>Welcome <span>back</span></h1>
        <p>Sign in to your Vexaro account</p>
      </header>

      @if (errorMessage()) {
        <div class="error-banner" role="alert">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <line
              x1="12"
              y1="8"
              x2="12"
              y2="12"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <circle cx="12" cy="16" r="0.75" fill="currentColor" />
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" novalidate autocomplete="on">
        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap" [class.has-error]="errorMessage()">
            <svg
              class="field-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <polyline
                points="22,6 12,13 2,6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="you@company.com"
              [(ngModel)]="email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label for="password">Password</label>
            <a routerLink="/forgot-password" class="forgot-link"
              >Forgot password?</a
            >
          </div>
          <div class="input-wrap" [class.has-error]="errorMessage()">
            <svg
              class="field-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect
                x="3"
                y="11"
                width="18"
                height="11"
                rx="2"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M7 11V7a5 5 0 0110 0v4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              placeholder="Enter your password"
              [(ngModel)]="password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" (click)="togglePassword()">
              @if (showPassword()) {
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                  <line
                    x1="1"
                    y1="1"
                    x2="23"
                    y2="23"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                  />
                </svg>
              } @else {
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                  <circle
                    cx="12"
                    cy="12"
                    r="3"
                    stroke="currentColor"
                    stroke-width="1.5"
                  />
                </svg>
              }
            </button>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" name="remember" [(ngModel)]="rememberMe" />
          <span class="checkmark"></span>
          <span>Keep me signed in for 30 days</span>
        </label>

        <button type="submit" class="submit-btn" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner"></span> Signing in…
          } @else {
            Sign in
          }
        </button>
      </form>

      <p class="info-note">
        No account yet? Access is by invitation only.<br />
        Contact your distributor or write to
        <a href="mailto:support@vexaro.in">support&#64;vexaro.in</a>
      </p>

      <footer class="form-footer">
        &copy; 2025 Vexaro Courier Solutions Pvt. Ltd.
      </footer>
    </div>
  </main>
</div>
