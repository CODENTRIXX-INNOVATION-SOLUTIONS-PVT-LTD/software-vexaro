    <div class="shipment-card">
        <div class="header">
            <h2>Recent Shipments</h2>
            <button class="view-btn"> View All</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Tracking ID</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Courier</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    @for(shipment of shipments; track shipment.trackingId){
                    <tr>
                        <td>{{shipment.trackingId}}</td>
                        <td>{{shipment.customer}}</td>
                        <td>
                            <span
                                class="status"
                                [class.delivered]="shipment.status==='Delivered'"
                                [class.transit]="shipment.status==='In Transit'"
                                [class.pending]="shipment.status==='Pending'">
                                {{shipment.status}}
                            </span>
                        </td>
                        <td>{{shipment.courier}}</td>
                        <td>{{shipment.date}}</td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
