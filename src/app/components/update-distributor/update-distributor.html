<div class="page">

    <!-- Back Button -->
    <div class="back-link" routerLink="/super-admin/distributors">
    <i class="fas fa-arrow-left"></i>
    Back to Distributors
</div>

    <!-- Header -->
    <div class="page-header">

        <div>
            <h1>Update Distributor</h1>
            <p>Edit distributor information and business details</p>
        </div>

        <div class="header-actions">

            <button
            routerLink="/super-admin/distributors"
                type="button"
                class="btn-outline">
                <i class="fas fa-times"></i>
                Cancel
            </button>

            <button
                type="submit"
                form="updateForm"
                class="btn-primary">
                <i class="fas fa-save"></i>
                Save Changes
            </button>

        </div>

    </div>

    <form
        id="updateForm"
        (ngSubmit)="updateDistributor()">

        <div class="content-grid">

            <!-- COMPANY INFORMATION -->

            <div class="card">

                <div class="card-title">
                    <div class="icon-circle blue">
                        <i class="fas fa-building"></i>
                    </div>

                    <span>Company Information</span>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Distributor Name</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.distributorName"
                            name="distributorName">
                    </div>

                    <div class="form-group">
                        <label>Display Name</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.displayName"
                            name="displayName">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input
                            type="email"
                            [(ngModel)]="distributor.email"
                            name="email">
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.phone"
                            name="phone">
                    </div>

                    <div class="form-group full-width">
                        <label>Address</label>

                        <textarea
                            rows="4"
                            [(ngModel)]="distributor.address"
                            name="address">
                        </textarea>
                    </div>

                    <div class="form-group">
                        <label>Region</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.region"
                            name="region">
                    </div>

                    <div class="form-group">
                        <label>City</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.city"
                            name="city">
                    </div>

                    <div class="form-group">
                        <label>Pincode</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.pincode"
                            name="pincode">
                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="right-section">

                <!-- CONTACT INFO -->

                <div class="card">

                    <div class="card-title">

                        <div class="icon-circle green">
                            <i class="fas fa-user"></i>
                        </div>

                        <span>Login & Contact Information</span>

                    </div>

                    <div class="form-group">
                        <label>Contact Person</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.contactPerson"
                            name="contactPerson">
                    </div>

                    <div class="form-group">
                        <label>Contact Phone</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.contactPhone"
                            name="contactPhone">
                    </div>

                    <div class="form-group">
                        <label>Contact Email</label>
                        <input
                            type="email"
                            [(ngModel)]="distributor.contactEmail"
                            name="contactEmail">
                    </div>

                    <div class="form-group">
                        <label>Status</label>

                        <select
                            [(ngModel)]="distributor.status"
                            name="status">

                            <option value="Active">
                                Active
                            </option>

                            <option value="Inactive">
                                Inactive
                            </option>

                        </select>
                    </div>

                </div>

                <!-- BUSINESS INFO -->

                <div class="card">

                    <div class="card-title">

                        <div class="icon-circle purple">
                            <i class="fas fa-file-invoice"></i>
                        </div>

                        <span>Business Information</span>

                    </div>

                    <div class="form-group">
                        <label>GST Number</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.gstNumber"
                            name="gstNumber">
                    </div>

                    <div class="form-group">
                        <label>PAN Number</label>
                        <input
                            type="text"
                            [(ngModel)]="distributor.panNumber"
                            name="panNumber">
                    </div>

                    <div class="form-group">
                        <label>Payment Terms</label>

                        <select
                            [(ngModel)]="distributor.paymentTerms"
                            name="paymentTerms">

                            <option>7 Days</option>
                            <option>15 Days</option>
                            <option>30 Days</option>
                            <option>45 Days</option>

                        </select>
                    </div>

                    <div class="form-group">
                        <label>Credit Limit</label>

                        <input
                            type="number"
                            [(ngModel)]="distributor.creditLimit"
                            name="creditLimit">
                    </div>

                </div>

            </div>

        </div>

    </form>

</div>
