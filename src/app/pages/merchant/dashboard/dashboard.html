<div class="dashboard">
    <app-dashboard-header role="Merchande" userName="Sahil Gour" email="sahil@gmail.com"
        profileImage="https://i.pravatar.cc/150?img=12"></app-dashboard-header>

    <app-stats-cards [cards]="cards"></app-stats-cards>

    <div class="two-section">
        <app-recent-shipments></app-recent-shipments>
        <div class="quick-section">
            <h3>Quick Actions</h3>
            <button class="action-btn primary">
                <span class="material-icons">add</span>
                Create Shipment
            </button>
            <button class="action-btn">
                <span class="material-icons">upload_file</span>
                Bulk Upload
            </button>
            <button class="action-btn">
                <span class="material-icons">print</span>
                Print Labels
            </button>
            <button class="action-btn">
                <span class="material-icons">download</span>
                Download Manifest
            </button>
        </div>
    </div>

    <div class="chart-section">
        <app-shipment-overview></app-shipment-overview>
        <app-top-destinations></app-top-destinations>
    </div>
</div>
