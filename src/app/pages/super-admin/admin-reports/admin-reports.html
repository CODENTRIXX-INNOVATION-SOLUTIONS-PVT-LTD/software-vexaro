<div class="reports-page">

    <!-- Header -->
    <div class="reports-header">

        <div>
            <h1>Reports & Analytics</h1>
            <p>Monitor shipments, revenue, merchants and distributors performance.</p>
        </div>

        <div class="header-actions">
            <button class="btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export Reports
            </button>
        </div>

    </div>

    <!-- Summary Cards -->
    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            </div>

            <div>
                <h3>12,540</h3>
                <p>Total Shipments</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M6 3h12M6 8h12M6 3a5 5 0 0 1 5 5H6M6 13h5a5 5 0 0 1-5 5M6 13l9 8"></path></svg>
            </div>

            <div>
                <h3>₹8.5 Cr</h3>
                <p>Total Revenue</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>

            <div>
                <h3>1,240</h3>
                <p>Merchants</p>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line><path d="M8 6h.01M16 6h.01M8 10h.01M16 10h.01M12 6h.01M12 10h.01"></path></svg>
            </div>

            <div>
                <h3>180</h3>
                <p>Distributors</p>
            </div>
        </div>

    </div>

    <!-- Tabs -->
    <div class="tabs">

        <button class="btn-outline" [class.active-tab]="activeTab === 'shipment-report'"
            (click)="activeTab = 'shipment-report'">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            Shipment Report

        </button>

        <button class="btn-outline" [class.active-tab]="activeTab === 'revenue-report'"
            (click)="activeTab = 'revenue-report'">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
            Revenue Report

        </button>

        <button class="btn-outline" [class.active-tab]="activeTab === 'merchant-report'"
            (click)="activeTab = 'merchant-report'">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Merchant Report

        </button>

        <button class="btn-outline" [class.active-tab]="activeTab === 'distributor-report'"
            (click)="activeTab = 'distributor-report'">

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line><path d="M8 6h.01M16 6h.01M8 10h.01M16 10h.01M12 6h.01M12 10h.01"></path></svg>
            Distributor Report

        </button>

    </div>

    <!-- Content -->
    <div class="report-content">

        <app-super-admin-shipment-reports *ngIf="activeTab === 'shipment-report'">
        </app-super-admin-shipment-reports>

        <app-super-admin-revenue-reports *ngIf="activeTab === 'revenue-report'">
        </app-super-admin-revenue-reports>

        <app-super-admin-distributor-reports *ngIf="activeTab === 'distributor-report'">
        </app-super-admin-distributor-reports>

        <app-super-admin-merchant-reports *ngIf="activeTab === 'merchant-report'">
        </app-super-admin-merchant-reports>

    </div>

</div>
