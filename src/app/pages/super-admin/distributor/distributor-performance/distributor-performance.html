<div class="page">

    <h1>Performance Dashboard</h1>

    <div class="stats-grid">

        <div class="stat-card">
            <h2>{{ stats.totalShipments }}</h2>
            <p>Total Shipments</p>
        </div>

        <div class="stat-card">
            <h2>{{ stats.completedShipments }}</h2>
            <p>Completed</p>
        </div>

        <div class="stat-card">
            <h2>{{ stats.activeMerchants }}</h2>
            <p>Active Merchants</p>
        </div>

        <div class="stat-card">
            <h2>{{ stats.assignedWarehouses }}</h2>
            <p>Warehouses</p>
        </div>

        <div class="stat-card">
            <h2>₹{{ stats.monthlyRevenue }}</h2>
            <p>Revenue</p>
        </div>

    </div>

</div>
