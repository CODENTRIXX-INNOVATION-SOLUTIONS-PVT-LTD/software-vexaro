<div class="page">

    <div class="page-header">
        <h1>Assigned Merchants</h1>
        <p>Total Merchants: {{ merchants.length }}</p>
    </div>

    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>Merchant</th>
                    <th>Owner</th>
                    <th>City</th>
                    <th>Total Orders</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let merchant of merchants">

                    <td>{{ merchant.name }}</td>
                    <td>{{ merchant.owner }}</td>
                    <td>{{ merchant.city }}</td>
                    <td>{{ merchant.orders }}</td>
                    <td>
                        <span class="badge" [class.active]="merchant.status === 'Active'"
                            [class.inactive]="merchant.status === 'Inactive'">
                            {{ merchant.status }}
                        </span>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
