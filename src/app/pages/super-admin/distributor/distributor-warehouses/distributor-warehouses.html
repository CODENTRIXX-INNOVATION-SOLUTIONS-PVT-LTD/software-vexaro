<div class="page">

    <div class="page-header">
        <h1>Assigned Warehouses</h1>
        <p>Total Warehouses: {{ warehouses.length }}</p>
    </div>

    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>Warehouse</th>
                    <th>City</th>
                    <th>Manager</th>
                    <th>Capacity</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let warehouse of warehouses">

                    <td>{{ warehouse.name }}</td>
                    <td>{{ warehouse.city }}</td>
                    <td>{{ warehouse.manager }}</td>
                    <td>{{ warehouse.capacity }}</td>
                    <td>
                        <span class="badge"
                              [class.active]="warehouse.status==='Active'"
                              [class.inactive]="warehouse.status==='Inactive'">
                            {{ warehouse.status }}
                        </span>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
