<div class="page">

    <div class="page-header">
        <h1>Payments</h1>
        <p>Distributor payment history</p>
    </div>

    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>Payment ID</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Method</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let payment of payments">

                    <td>{{ payment.paymentId }}</td>
                    <td>₹{{ payment.amount }}</td>
                    <td>{{ payment.date }}</td>
                    <td>{{ payment.method }}</td>

                    <td>
                        <span class="badge"
                            [class.active]="payment.status === 'Paid'"
                            [class.pending]="payment.status === 'Pending'">

                            {{ payment.status }}

                        </span>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
