<div class="page">

    <div class="page-header">
        <h1>Settings</h1>
        <p>Manage company, notification, and business rule configurations</p>
    </div>

    <!-- Company Settings -->

    <div class="card">

        <h2>Company Settings</h2>

        <div class="form-grid">

            <div class="form-group">
                <label>Company Name</label>
                <input type="text"
                    [(ngModel)]="settings.companySettings.companyName">
            </div>

            <div class="form-group">
                <label>Logo</label>
                <input type="file">
            </div>

            <div class="form-group">
                <label>GST Number</label>
                <input type="text"
                    [(ngModel)]="settings.companySettings.gstNumber">
            </div>

            <div class="form-group full-width">
                <label>Address</label>
                <textarea rows="4"
                    [(ngModel)]="settings.companySettings.address">
                </textarea>
            </div>

            <div class="form-group">
                <label>Support Email</label>
                <input type="email"
                    [(ngModel)]="settings.companySettings.supportEmail">
            </div>

        </div>

    </div>

    <!-- Notification Settings -->

    <div class="card">

        <h2>Notification Settings</h2>

        <div class="setting-row">
            <span>SMS Notifications</span>
            <input type="checkbox"
                [(ngModel)]="settings.notificationSettings.smsEnabled">
        </div>

        <div class="setting-row">
            <span>Email Notifications</span>
            <input type="checkbox"
                [(ngModel)]="settings.notificationSettings.emailEnabled">
        </div>

        <div class="setting-row">
            <span>WhatsApp Notifications</span>
            <input type="checkbox"
                [(ngModel)]="settings.notificationSettings.whatsappEnabled">
        </div>

    </div>

    <!-- Platform Business Rules Configuration -->
    <div class="card">
        <h2>Business Rules Configuration</h2>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Platform Rate Markup (%)</label>
                <div class="input-with-symbol">
                    <input type="number" [(ngModel)]="settings.platformRateConfig.markupPercentage" step="0.1">
                    <span class="symbol">%</span>
                </div>
            </div>

            <div class="form-group">
                <label>Base Weight Limit (kg)</label>
                <div class="input-with-symbol">
                    <input type="number" [(ngModel)]="settings.weightSlabManagement.baseWeightLimit" step="0.5">
                    <span class="symbol">kg</span>
                </div>
            </div>

            <div class="form-group">
                <label>Extra Weight Step (kg)</label>
                <div class="input-with-symbol">
                    <input type="number" [(ngModel)]="settings.weightSlabManagement.extraWeightStep" step="0.5">
                    <span class="symbol">kg</span>
                </div>
            </div>

            <div class="form-group">
                <label>Max Compensation Ceiling</label>
                <div class="input-with-symbol">
                    <input type="number" [(ngModel)]="settings.compensationCeiling.defaultCapPerShipment">
                    <span class="symbol">₹</span>
                </div>
            </div>

            <div class="form-group">
                <label>Weight Dispute Window</label>
                <div class="input-with-symbol">
                    <input type="number" [(ngModel)]="settings.weightDisputeWindow.defaultDaysAllowed">
                    <span class="symbol">days</span>
                </div>
            </div>
        </div>
    </div>

    <button class="save-btn" (click)="saveSettings()">
        Save Settings
    </button>

</div>
