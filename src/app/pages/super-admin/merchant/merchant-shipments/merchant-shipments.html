<div class="page">

    <div class="page-header">
        <h1>Shipments</h1>
        <p>Track merchant shipment activities</p>
    </div>

    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>Shipment ID</th>
                    <th>Order ID</th>
                    <th>Destination</th>
                    <th>Dispatch Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                @for (shipment of shipments; track shipment.shipmentId) {

                <tr>

                    <td>{{ shipment.shipmentId }}</td>

                    <td>{{ shipment.orderId }}</td>

                    <td>{{ shipment.destination }}</td>

                    <td>{{ shipment.dispatchDate }}</td>

                    <td>
                        <span class="badge"
                            [class.delivered]="shipment.status === 'Delivered'"
                            [class.transit]="shipment.status === 'In Transit'"
                            [class.pending]="shipment.status === 'Pending'">

                            {{ shipment.status }}

                        </span>
                    </td>

                </tr>

                }

            </tbody>

        </table>

    </div>

</div>
