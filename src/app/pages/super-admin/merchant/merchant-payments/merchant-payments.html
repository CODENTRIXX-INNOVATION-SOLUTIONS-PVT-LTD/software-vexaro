<div class="page">

    <div class="page-header">
        <h1>Payments</h1>
        <p>Track merchant payment transactions</p>
    </div>

    <div class="table-card">

        <table>

            <thead>
                <tr>
                    <th>Payment ID</th>
                    <th>Date</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                @for (payment of payments; track payment.paymentId) {

                <tr>

                    <td>{{ payment.paymentId }}</td>

                    <td>{{ payment.date }}</td>

                    <td>{{ payment.method }}</td>

                    <td>₹{{ payment.amount }}</td>

                    <td>
                        <span class="badge"
                            [class.completed]="payment.status === 'Completed'"
                            [class.pending]="payment.status === 'Pending'"
                            [class.failed]="payment.status === 'Failed'">

                            {{ payment.status }}

                        </span>
                    </td>

                </tr>

                }

            </tbody>

        </table>

    </div>

</div>
