<div class="page-container">
    <div class="page-header">
        <div>
            <h2>Regional Storage Hubs</h2>
            <div class="breadcrumb">
                <a routerLink="/super-admin/dashboard">Dashboard</a>
                <span>›</span>
                <span class="active">Warehouses</span>
            </div>
        </div>
    </div>

    <div class="table-card">
        <div class="filters-row">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                <input type="text" [(ngModel)]="searchQuery" placeholder="Search by warehouse, merchant, or distributor...">
            </div>
            
            <div class="status-filter">
                <select [(ngModel)]="statusFilter">
                    <option value="All">All Statuses</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Warehouse ID</th>
                    <th>Label</th>
                    <th>Tenant (Merchant)</th>
                    <th>Distributor</th>
                    <th>Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let wh of filteredWarehouses">
                    <td class="id-cell"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> {{ wh.id }}</td>
                    <td class="label-cell">{{ wh.label }}</td>
                    <td>{{ wh.tenant }}</td>
                    <td><span class="distributor-badge">{{ wh.distributor }}</span></td>
                    <td class="address-cell">{{ wh.address }}</td>
                    <td>
                        <span class="status-badge"
                            [class.success]="wh.status === 'Active'"
                            [class.failed]="wh.status === 'Inactive'">
                            {{ wh.status }}
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div *ngIf="filteredWarehouses.length === 0" class="no-results">
            No warehouses found matching your filters.
        </div>
    </div>
</div>
