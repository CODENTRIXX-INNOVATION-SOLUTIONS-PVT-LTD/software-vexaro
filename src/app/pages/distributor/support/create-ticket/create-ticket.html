<div class="header-section">
    <h2>Create Support Ticket</h2>
    <div class="actions">
        <button class="action-btn secondary" (click)="cancel()">Cancel</button>
    </div>
</div>

<div class="shipment-card mt-4">
    <div class="form-container">
        <div class="form-group">
            <label>Subject <span class="required">*</span></label>
            <input type="text" [(ngModel)]="ticketData.subject" placeholder="Brief description of the issue" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Category <span class="required">*</span></label>
                <select [(ngModel)]="ticketData.category" class="form-control">
                    <option value="" disabled>Select Category</option>
                    <option value="Technical">Technical Issue</option>
                    <option value="Finance">Billing & Finance</option>
                    <option value="Operations">Operations / Logistics</option>
                    <option value="Hardware">Hardware / Scanners</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Priority</label>
                <select [(ngModel)]="ticketData.priority" class="form-control">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Detailed Description <span class="required">*</span></label>
            <textarea [(ngModel)]="ticketData.description" rows="5" placeholder="Please provide as much detail as possible..." class="form-control"></textarea>
        </div>

        <div class="form-group">
            <label>Attachment (Optional)</label>
            <input type="file" class="form-control file-input">
        </div>

        <div class="form-actions mt-4">
            <button class="submit-btn" [disabled]="isSubmitting" (click)="submitTicket()">
                @if (isSubmitting) {
                    <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                } @else {
                    <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                }
                {{ isSubmitting ? 'Submitting...' : 'Submit Ticket' }}
            </button>
        </div>
    </div>
</div>
