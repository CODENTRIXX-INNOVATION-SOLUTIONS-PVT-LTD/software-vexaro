<div class="header-section">
    <h2>My Profile</h2>
    <p class="subtitle">Manage your personal account settings</p>
</div>

<div class="shipment-card mt-4">
    <div class="profile-header">
        <div class="avatar">
            {{profileData.firstName.charAt(0)}}{{profileData.lastName.charAt(0)}}
        </div>
        <div class="info">
            <h3>{{profileData.firstName}} {{profileData.lastName}}</h3>
            <p>{{profileData.role}} &bull; Joined {{profileData.joiningDate}}</p>
            <button class="upload-btn">Change Photo</button>
        </div>
    </div>

    <hr class="divider">

    <div class="form-container">
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" [(ngModel)]="profileData.firstName" class="form-control">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" [(ngModel)]="profileData.lastName" class="form-control">
            </div>
        </div>

        <div class="form-row mt-4">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" [(ngModel)]="profileData.email" class="form-control" readonly style="background: #f8fafc; color: #6b7280; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" [(ngModel)]="profileData.phone" class="form-control">
            </div>
        </div>

        <div class="form-actions mt-4">
            <button class="submit-btn" [disabled]="isSaving" (click)="saveProfile()">
                @if (isSaving) {
                    <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                } @else {
                    <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                }
                {{ isSaving ? 'Saving...' : 'Save Changes' }}
            </button>
        </div>
    </div>
</div>
