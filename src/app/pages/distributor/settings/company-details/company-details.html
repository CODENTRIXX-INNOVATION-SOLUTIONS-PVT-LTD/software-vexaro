<div class="header-section">
    <h2>Company Details</h2>
    <p class="subtitle">Update your registered business information</p>
</div>

<div class="shipment-card mt-4">
    <div class="form-container">
        <div class="section-title">
            <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line><path d="M8 6h.01M16 6h.01M8 10h.01M16 10h.01M12 6h.01M12 10h.01"></path></svg> Legal Information</h4>
        </div>

        <div class="form-group">
            <label>Registered Business Name</label>
            <input type="text" [(ngModel)]="companyData.businessName" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" [(ngModel)]="companyData.gstin" class="form-control">
            </div>
            <div class="form-group">
                <label>Company PAN</label>
                <input type="text" [(ngModel)]="companyData.pan" class="form-control">
            </div>
        </div>

        <div class="section-title mt-4">
            <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"></path><circle cx="12" cy="9" r="2.5"></circle></svg> Hub Address</h4>
        </div>

        <div class="form-group">
            <label>Address Line 1</label>
            <input type="text" [(ngModel)]="companyData.addressLine1" class="form-control">
        </div>
        
        <div class="form-group">
            <label>Address Line 2</label>
            <input type="text" [(ngModel)]="companyData.addressLine2" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" [(ngModel)]="companyData.city" class="form-control">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" [(ngModel)]="companyData.state" class="form-control">
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" [(ngModel)]="companyData.pincode" class="form-control">
            </div>
        </div>

        <div class="section-title mt-4">
            <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><rect x="2" y="3" width="20" height="14" rx="2"></rect><path d="M8 21h8M12 17v4"></path></svg> Support Contact</h4>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Support Email Address</label>
                <input type="email" [(ngModel)]="companyData.supportEmail" class="form-control">
            </div>
            <div class="form-group">
                <label>Support Phone Number</label>
                <input type="text" [(ngModel)]="companyData.supportPhone" class="form-control">
            </div>
        </div>

        <div class="form-actions mt-4">
            <button class="submit-btn" [disabled]="isSaving" (click)="saveDetails()">
                @if (isSaving) {
                    <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                } @else {
                    <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                }
                {{ isSaving ? 'Saving...' : 'Save Company Details' }}
            </button>
        </div>
    </div>
</div>
