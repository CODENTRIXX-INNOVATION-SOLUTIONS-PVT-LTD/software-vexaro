<div class="header-section">
    <h2>Company Details</h2>
    <p class="subtitle">Update your registered business information</p>
</div>

<div class="shipment-card mt-4">
    <div class="form-container">
        <div class="section-title">
            <h4><i class="fas fa-building"></i> Legal Information</h4>
        </div>

        <div class="form-group">
            <label>Registered Business Name</label>
            <input type="text" [(ngModel)]="companyData.businessName" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" [(ngModel)]="companyData.gstin" class="form-control">
            </div>
            <div class="form-group">
                <label>Company PAN</label>
                <input type="text" [(ngModel)]="companyData.pan" class="form-control">
            </div>
        </div>

        <div class="section-title mt-4">
            <h4><i class="fas fa-map-marker-alt"></i> Hub Address</h4>
        </div>

        <div class="form-group">
            <label>Address Line 1</label>
            <input type="text" [(ngModel)]="companyData.addressLine1" class="form-control">
        </div>
        
        <div class="form-group">
            <label>Address Line 2</label>
            <input type="text" [(ngModel)]="companyData.addressLine2" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" [(ngModel)]="companyData.city" class="form-control">
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" [(ngModel)]="companyData.state" class="form-control">
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" [(ngModel)]="companyData.pincode" class="form-control">
            </div>
        </div>

        <div class="section-title mt-4">
            <h4><i class="fas fa-headset"></i> Support Contact</h4>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Support Email Address</label>
                <input type="email" [(ngModel)]="companyData.supportEmail" class="form-control">
            </div>
            <div class="form-group">
                <label>Support Phone Number</label>
                <input type="text" [(ngModel)]="companyData.supportPhone" class="form-control">
            </div>
        </div>

        <div class="form-actions mt-4">
            <button class="submit-btn" [disabled]="isSaving" (click)="saveDetails()">
                <i class="fas" [class.fa-spinner]="isSaving" [class.fa-spin]="isSaving" [class.fa-save]="!isSaving"></i> 
                {{ isSaving ? 'Saving...' : 'Save Company Details' }}
            </button>
        </div>
    </div>
</div>
