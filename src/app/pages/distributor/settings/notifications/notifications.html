<div class="header-section">
    <h2>Notification Preferences</h2>
    <p class="subtitle">Choose what you want to be notified about</p>
</div>

<div class="shipment-card mt-4">
    <div class="form-container">
        <!-- Email Settings -->
        <div class="settings-group">
            <div class="section-title">
                <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> Email Notifications</h4>
            </div>
            
            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">New Merchant Onboarded</span>
                    <span class="label-desc">Receive an email when a new merchant completes verification.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.email.newMerchant">
                    <span class="slider"></span>
                </div>
            </label>

            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">Daily Summary Reports</span>
                    <span class="label-desc">Get a daily digest of all deliveries, margins, and COD collected.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.email.dailyReport">
                    <span class="slider"></span>
                </div>
            </label>

            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">Settlement Alerts</span>
                    <span class="label-desc">Notify me when payouts to my master wallet are processed.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.email.settlementAlert">
                    <span class="slider"></span>
                </div>
            </label>
        </div>

        <!-- SMS Settings -->
        <div class="settings-group mt-4">
            <div class="section-title">
                <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><path d="M8 7h8M8 11h8"></path></svg> SMS Alerts</h4>
            </div>
            
            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">Low Wallet Balance</span>
                    <span class="label-desc">Instant SMS when master wallet balance falls below ₹5000.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.sms.walletLow">
                    <span class="slider"></span>
                </div>
            </label>

            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">Weight Disputes Raised</span>
                    <span class="label-desc">Immediate alert when a merchant challenges a shipment weight.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.sms.disputeRaised">
                    <span class="slider"></span>
                </div>
            </label>
        </div>

        <!-- Push Settings -->
        <div class="settings-group mt-4">
            <div class="section-title">
                <h4><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> Push Notifications (Web App)</h4>
            </div>
            
            <label class="toggle-row">
                <div class="text-block">
                    <span class="label-title">Support Ticket Updates</span>
                    <span class="label-desc">Get notified directly in the dashboard when support replies.</span>
                </div>
                <div class="toggle-switch">
                    <input type="checkbox" [(ngModel)]="notifs.push.ticketUpdate">
                    <span class="slider"></span>
                </div>
            </label>
        </div>

        <div class="form-actions mt-4">
            <button class="submit-btn" [disabled]="isSaving" (click)="saveSettings()">
                @if (isSaving) {
                    <svg class="animate-spin svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                } @else {
                    <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle; margin-right: 6px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                }
                {{ isSaving ? 'Saving...' : 'Save Preferences' }}
            </button>
        </div>
    </div>
</div>
