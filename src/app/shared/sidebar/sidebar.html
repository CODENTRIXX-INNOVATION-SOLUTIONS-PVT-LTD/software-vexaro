<div class="sidebar-overlay" [class.show]="drawerOpen" (click)="closeDrawer()"></div>

<nav class="sidebar" aria-label="Primary navigation" [class.collapsed]="collapsed" [class.drawer-open]="drawerOpen">
    <div class="logo-container">
        <img src="../../../assets/logo.png" alt="Vaxaro Logo">
        <button type="button" class="sidebar-toggle" (click)="toggleCollapse()" aria-label="Toggle menu">
            <span class="material-icons">menu</span>
        </button>
    </div>

    <ul class="nav-menu" [class]="sidebarClass">
        @for(item of menuItems; track item.label) {
            <!-- If item has children (Nested Parent) -->
            @if(item.children && item.children.length > 0) {
                <li class="has-submenu" [class.active-parent]="isParentActive(item)">
                    <a (click)="toggleSubmenu(item)" class="menu-item-link" [class.expanded]="item.expanded">
                        <div class="menu-item-content">
                            <i *ngIf="item.icon" class="fas {{item.icon}}"></i>
                            <span class="label">{{ item.label }}</span>
                        </div>
                        <i class="fas fa-chevron-down arrow-icon" [class.rotate]="item.expanded"></i>
                    </a>
                    
                    <ul class="submenu" [class.show]="item.expanded && !collapsed">
                        @for(child of item.children; track child.route) {
                            <li routerLinkActive="active-menu">
                                <a [routerLink]="child.route" class="submenu-link">
                                    <span class="dot"></span>
                                    {{ child.label }}
                                </a>
                            </li>
                        }
                    </ul>
                </li>
            } 
            <!-- Single Menu Item -->
            @else {
                <li routerLinkActive="active-menu">
                    <a [routerLink]="item.route" class="menu-item-link">
                        <div class="menu-item-content">
                            <i *ngIf="item.icon" class="fas {{item.icon}}"></i>
                            <span class="label">{{ item.label }}</span>
                        </div>
                    </a>
                </li>
            }
        }
    </ul>

    <button type="button" class="logout" (click)="logout()">
        <span class="material-icons" aria-hidden="true">logout</span>
        <span class="label">Logout</span>
    </button>
</nav>
