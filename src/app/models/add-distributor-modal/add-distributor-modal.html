<div class="modal-container">

    <!-- Header -->
    <div class="modal-header">

        <div>
            <h2>Add Distributor</h2>
            <p>Create a new distributor account</p>
        </div>

        <button class="close-btn" (click)="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        </button>

    </div>

    <!-- Body -->
    <div class="modal-body">

        <!-- Company Information -->
        <div class="section">

            <h3>Company Information</h3>

            <div class="form-grid">

                <div class="form-group">
                    <label>Distributor Name *</label>
                    <input
                        type="text"
                        placeholder="Enter distributor name"
                    >
                </div>

                <div class="form-group">
                    <label>Company Code *</label>
                    <input
                        type="text"
                        placeholder="DIST001"
                    >
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input
                        type="email"
                        placeholder="company@example.com"
                    >
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input
                        type="text"
                        placeholder="9876543210"
                    >
                </div>

                <div class="form-group full-width">
                    <label>Address *</label>
                    <textarea
                        rows="3"
                        placeholder="Enter complete address"
                    ></textarea>
                </div>

            </div>

        </div>

        <!-- Location Information -->
        <div class="section">

            <h3>Location Information</h3>

            <div class="form-grid">

                <div class="form-group">
                    <label>Region *</label>
                    <select>
                        <option>Select Region</option>
                        <option>North Zone</option>
                        <option>South Zone</option>
                        <option>East Zone</option>
                        <option>West Zone</option>
                        <option>Central Zone</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>State *</label>
                    <input
                        type="text"
                        placeholder="Madhya Pradesh"
                    >
                </div>

                <div class="form-group">
                    <label>City *</label>
                    <input
                        type="text"
                        placeholder="Bhopal"
                    >
                </div>

                <div class="form-group">
                    <label>Pincode *</label>
                    <input
                        type="text"
                        placeholder="462001"
                    >
                </div>

                <div class="form-group">
                    <label>Distributor Type *</label>
                    <select>
                        <option>Regional</option>
                        <option>City</option>
                        <option>National</option>
                    </select>
                </div>

            </div>

        </div>

        <!-- Login Information -->
        <div class="section">

            <h3>Login Information</h3>

            <div class="form-grid">

                <div class="form-group">
                    <label>Contact Person *</label>
                    <input
                        type="text"
                        placeholder="Contact person name"
                    >
                </div>

                <div class="form-group">
                    <label>Contact Phone *</label>
                    <input
                        type="text"
                        placeholder="9876543210"
                    >
                </div>

                <div class="form-group">
                    <label>Login Email *</label>
                    <input
                        type="email"
                        placeholder="login@example.com"
                    >
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input type="password">
                </div>

                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password">
                </div>

            </div>

        </div>

        <!-- Business Information -->
        <div class="section">

            <h3>Business Information</h3>

            <div class="form-grid">

                <div class="form-group">
                    <label>GST Number</label>
                    <input
                        type="text"
                        placeholder="GST Number"
                    >
                </div>

                <div class="form-group">
                    <label>PAN Number</label>
                    <input type="text" placeholder="PAN Number">
                </div>

                <div class="form-group">
                    <label>Credit Limit (₹)</label>
                    <input
                        type="number"
                        placeholder="100000"
                    >
                </div>

                <div class="form-group">
                    <label>Commission (%)</label>
                    <input
                        type="number"
                        placeholder="5"
                    >
                </div>

                <div class="form-group">
                    <label>Status *</label>
                    <select>
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <div class="modal-actions">

        <button class="cancel-btn"  (click)="closeModal()">
            Cancel
        </button>

       <button class="save-btn" (click)="saveDistributor()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    Save Distributor
</button>

    </div>

</div>
