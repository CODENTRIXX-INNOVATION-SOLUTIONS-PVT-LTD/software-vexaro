<div class="modal-container">
    <!-- Header -->
    <div class="modal-header">
        <div>
            <h2>Add Distributor</h2>
            <p>Invite a new distributor to the platform</p>
        </div>

        <button class="close-btn" (click)="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
        </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
        <div class="section">
            <h3>Distributor Information</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" [(ngModel)]="firstName" placeholder="Enter first name">
                </div>
                
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" [(ngModel)]="lastName" placeholder="Enter last name">
                </div>

                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" [(ngModel)]="companyName" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" [(ngModel)]="email" placeholder="company@example.com">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" [(ngModel)]="phone" placeholder="9876543210">
                </div>
            </div>
        </div>
    </div>

    <!-- Error Message -->
    <div class="error-message" *ngIf="errorMessage" style="color: red; padding: 10px 20px; text-align: right;">
        {{ errorMessage }}
    </div>

    <!-- Footer -->
    <div class="modal-actions">
        <button class="cancel-btn" [disabled]="isSaving" (click)="closeModal()">
            Cancel
        </button>

        <button class="save-btn" [disabled]="isSaving" (click)="saveDistributor()">
            <svg *ngIf="!isSaving" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                style="width: 1em; height: 1em; display: inline-block; vertical-align: middle;" class="svg-icon">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            {{ isSaving ? 'Sending Invite...' : 'Invite Distributor' }}
        </button>
    </div>
</div>
