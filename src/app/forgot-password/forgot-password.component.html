<div class="login-wrapper">

  <!-- ===================== LEFT PANEL ===================== -->
  <div class="left-panel">
    <img
      class="panel-image"
      src="assets/LoginPagePhoto.png"
      alt="VEXARO - Delivering Trust, Connecting the World"
    />
  </div>

  <!-- ===================== RIGHT PANEL ===================== -->
  <div class="right-panel">

    <!-- Language Selector -->
    <div class="lang-selector">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#374151" stroke-width="1.5" fill="none"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="#374151" stroke-width="1.5"/>
        <line x1="3.5" y1="7" x2="20.5" y2="7" stroke="#374151" stroke-width="1"/>
        <line x1="3.5" y1="17" x2="20.5" y2="17" stroke="#374151" stroke-width="1"/>
      </svg>
      <span>English</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 9l6 6 6-6" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Form Container -->
    <div class="form-container">
      <div class="form-header">
        <h2>Forgot Password?</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      @if (!isSubmitted) {
      <form (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label for="email">Email Address</label>
          <div class="input-box">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
                <polyline points="22,6 12,13 2,6" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="Enter your email address"
              [(ngModel)]="email"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-btn">Send Reset Link</button>
      </form>
      } @else {
        <div class="success-message">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 4L12 14.01l-3-3" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h3>Check your email</h3>
          <p>We have sent a password reset link to <strong>{{ email }}</strong>.</p>
        </div>
      }

      <!-- Options Row -->
      <div class="form-options center-options">
        <a routerLink="/login" class="forgot-link">← Back to Login</a>
      </div>

    </div>
  </div>
</div>
