<div class="auth-wrapper">
  <aside class="left-panel">
    <div class="illustration-container">
      <img
        src="assets/LoginPagePhoto.png"
        alt="Vexaro Operations"
        class="left-panel-img"
      />
    </div>
  </aside>

  <main class="right-panel">
    <div class="form-wrap">
      <a routerLink="/" class="brand brand--mobile">
        <img src="assets/logo.png" alt="Vexaro Logo" class="brand-logo-img" />
      </a>

      @if (successMessage()) {
        <div class="state-card state-card--success">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M8 12l3 3 5-5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <h2>Check your email</h2>
          <p>{{ successMessage() }}</p>
          <a routerLink="/login" class="back-link">← Back to login</a>
        </div>
      } @else {
        <header class="form-header">
          <h1>Reset <span>password</span></h1>
          <p>Enter your email to receive a password reset link.</p>
        </header>

        @if (errorMessage()) {
          <div class="error-banner" role="alert">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <line
                x1="12"
                y1="8"
                x2="12"
                y2="12"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <circle cx="12" cy="16" r="0.75" fill="currentColor" />
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" novalidate autocomplete="on">
          <div class="field">
            <label for="email">Email address</label>
            <div class="input-wrap" [class.has-error]="errorMessage()">
              <svg
                class="field-icon"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <polyline
                  points="22,6 12,13 2,6"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <input
                id="email"
                type="email"
                name="email"
                placeholder="you@company.com"
                [(ngModel)]="email"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="isLoading()">
            @if (isLoading()) {
              <span class="spinner"></span> Sending link…
            } @else {
              Send reset link
            }
          </button>
        </form>

        <p class="info-note">
          Remember your password? <a routerLink="/login">Sign in here</a>
        </p>

        <footer class="form-footer">
          &copy; 2025 Vexaro Courier Solutions Pvt. Ltd.
        </footer>
      }
    </div>
  </main>
</div>
