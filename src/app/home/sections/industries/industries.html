<section id="industries" class="py-24 lg:py-32">
  <div class="container-custom">
    <div class="grid lg:grid-cols-[1fr_1.1fr] gap-12 items-start">
      <div appReveal>
        <span class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">
          <span class="h-px w-6 bg-accent"></span> Industries
        </span>
        <h2 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight">
          Designed for high-accountability
          <span class="font-display italic font-medium text-brand-blue">delivery networks.</span>
        </h2>
        <p class="mt-5 text-ink/55 leading-relaxed max-w-md">
          Each industry gets a clear operating view for serviceability, risk,
          customer communication and delivery precision.
        </p>

        <!-- Network map -->
        <div class="mt-8 relative rounded-3xl border border-ink/10 bg-white aspect-[4/3] overflow-hidden">
          <svg viewBox="0 0 100 75" class="absolute inset-0 h-full w-full" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
            <!-- connections to hub -->
            <g stroke="rgb(11,74,111)" stroke-opacity="0.18" stroke-width="0.4" fill="none">
              @for (n of nodes; track $index) {
                <line [attr.x1]="hub.x" [attr.y1]="hub.y" [attr.x2]="n.x" [attr.y2]="n.y"/>
              }
            </g>
            <!-- nodes -->
            @for (n of nodes; track $index) {
              <circle [attr.cx]="n.x" [attr.cy]="n.y" r="1" fill="rgb(11,74,111)" fill-opacity="0.35"/>
            }
            <!-- hub with pulse -->
            <g [attr.transform]="'translate(' + hub.x + ' ' + hub.y + ')'">
              <circle r="2.4" fill="rgb(232,116,58)" opacity="0.25">
                <animate attributeName="r" values="2;5.5;2" dur="2.8s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.35;0;0.35" dur="2.8s" repeatCount="indefinite"/>
              </circle>
              <circle r="1.6" fill="rgb(232,116,58)"/>
            </g>
          </svg>
          <span class="absolute left-4 top-4 text-[10px] font-bold tracking-[0.2em] uppercase text-ink/40">India Network</span>
        </div>
      </div>

      <div appReveal [revealDelay]="1" class="divide-y divide-ink/10">
        @for (item of items; track item.index) {
          <a href="#cta" class="group flex items-start justify-between gap-6 py-7 first:pt-0">
            <div class="flex items-start gap-4 sm:gap-6">
              <span class="text-sm font-semibold text-ink/30 pt-1">{{ item.index }}</span>
              <div>
                <h3 class="text-xl sm:text-2xl font-extrabold" [class]="item.highlight ? 'text-accent' : ''">{{ item.name }}</h3>
                <p class="mt-1.5 text-sm text-ink/50 max-w-sm">{{ item.body }}</p>
              </div>
            </div>
            <span
              class="shrink-0 mt-1 flex h-9 w-9 items-center justify-center rounded-full text-sm transition-transform duration-300 group-hover:translate-x-1 group-hover:-translate-y-1"
              [class]="item.highlight ? 'bg-accent text-white' : 'border border-ink/15 text-ink/50'"
            >&rarr;</span>
          </a>
        }
      </div>
    </div>
  </div>
</section>
