<section id="resources" class="py-24 lg:py-32">
  <div class="container-custom">
    <div appReveal class="max-w-xl mb-14">
      <span class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">
        <span class="h-px w-6 bg-accent"></span> Resources &amp; Careers
      </span>
      <h2 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight">
        Insights, product thinking,
        <span class="font-display italic font-medium text-brand-blue">and team growth.</span>
      </h2>
    </div>

    <div class="grid sm:grid-cols-3 gap-5">
      @for (card of cards; track card.title; let i = $index) {
        <a
          href="#cta"
          appReveal [revealDelay]="i + 1"
          class="group rounded-3xl border border-ink/10 bg-white p-7 flex flex-col transition-shadow duration-300 hover:shadow-xl hover:shadow-ink/5"
        >
          <span class="text-xs font-bold tracking-[0.2em] uppercase text-accent">{{ card.tag }}</span>
          <h3 class="mt-4 text-lg lg:text-xl font-bold leading-snug">{{ card.title }}</h3>
          <p class="mt-3 text-sm text-ink/55 leading-relaxed flex-1">{{ card.body }}</p>
          <span class="mt-6 inline-flex items-center gap-2 text-sm font-semibold">
            Read more
            <span class="inline-block transition-transform duration-300 group-hover:translate-x-1">&rarr;</span>
          </span>
        </a>
      }
    </div>
  </div>
</section>
