<section id="platform" class="py-24 lg:py-32">
  <div class="container-custom">
    <div class="grid lg:grid-cols-[1fr_1.3fr] gap-10 items-end mb-14">
      <div appReveal>
        <span class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">
          <span class="h-px w-6 bg-accent"></span> What Vexaro Does
        </span>
      </div>
      <h2 appReveal class="text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight">
        One operating layer for
        <span class="font-display italic font-medium text-brand-blue">every stakeholder</span>
        in the chain.
      </h2>
    </div>

    <div class="grid sm:grid-cols-2 gap-5">
      @for (f of features; track f.title; let i = $index) {
        <div appReveal [revealDelay]="(i % 2) + 1" class="rounded-3xl border border-ink/10 bg-white p-8 transition-shadow duration-300 hover:shadow-xl hover:shadow-ink/5">
          <span class="text-xs font-bold tracking-[0.2em] uppercase text-accent">{{ f.tag }}</span>
          <h3 class="mt-4 text-xl sm:text-2xl font-bold">{{ f.title }}</h3>
          <p class="mt-3 text-sm sm:text-base text-ink/55 leading-relaxed">{{ f.body }}</p>
        </div>
      }
    </div>
  </div>
</section>
