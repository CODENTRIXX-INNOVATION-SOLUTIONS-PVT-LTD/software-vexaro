<section class="bg-ink text-paper py-24 lg:py-28">
  <div class="container-custom">
    <div appReveal class="max-w-xl mb-14">
      <span class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">
        <span class="h-px w-6 bg-accent"></span> By The Numbers
      </span>
      <h2 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight">
        Built on real volume,
        <span class="font-display italic font-medium text-white/60">measured daily.</span>
      </h2>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-y-10 gap-x-6 border-t border-white/10 pt-10">
      @for (s of stats; track s.label; let i = $index) {
        <div appReveal [revealDelay]="i % 4">
          <p class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tabular-nums text-white/90">
            <span appCountUp [countTo]="s.value" [countDecimals]="s.decimals" [countSuffix]="s.suffix" [countDuration]="1800"></span>
          </p>
          <p class="mt-2 text-xs sm:text-sm font-semibold tracking-widest uppercase text-white/40">{{ s.label }}</p>
        </div>
      }
    </div>
  </div>
</section>
