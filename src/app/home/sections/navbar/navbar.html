<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [class]="scrolled() ? 'py-3' : 'py-5'"
>
  <div class="container-custom">
    <div
      class="flex items-center justify-between gap-4 rounded-full border transition-all duration-500 px-4 sm:px-6 py-3"
      [ngClass]="scrolled() ? 'bg-white/80 border-ink/10 backdrop-blur-md shadow-[0_1px_0_0_rgba(10,10,10,0.04)]' : 'bg-transparent border-transparent'"
    >
      <a
        routerLink="/"
        class="flex items-center shrink-0"
        (click)="closeMenu()"
      >
        <img
          src="assets/logo.png"
          alt="Vexaro Logo"
          class="h-8 w-auto"
          style="height: 32px; width: auto"
        />
      </a>

      <nav class="hidden lg:flex items-center gap-8">
        @for (link of links; track link.label) {
        <a
          [href]="link.href"
          class="text-sm font-medium text-ink/70 hover:text-ink transition-colors"
          >{{ link.label }}</a
        >
        }
      </nav>

      <div class="hidden lg:flex items-center gap-3 shrink-0">
        <a
          routerLink="/login"
          class="text-sm font-semibold text-ink hover:text-accent transition-colors px-2"
          >Log in</a
        >
        <a
          routerLink="/register"
          class="text-sm font-semibold text-ink hover:text-accent transition-colors px-2"
          >Sign Up</a
        >
        <a
          href="https://vexarocouriersolutions.com/"
          target="_blank"
          rel="noopener"
          class="group inline-flex items-center gap-2 rounded-full bg-black text-white text-sm font-semibold px-5 py-2.5 transition-colors hover:text-accent"
        >
          Explore Platform
          <span
            class="inline-block transition-transform duration-300 group-hover:translate-x-1"
            >&rarr;</span
          >
        </a>
      </div>

      <button
        type="button"
        class="lg:hidden flex h-9 w-9 items-center justify-center rounded-full border border-ink/15"
        (click)="toggleMenu()"
        aria-label="Toggle navigation"
      >
        <span class="sr-only">Menu</span>
        <div class="flex flex-col gap-1.5">
          <span
            class="block h-0.5 w-4 bg-ink transition-transform duration-300"
            [class.rotate-45]="menuOpen()"
            [class.translate-y-2]="menuOpen()"
          ></span>
          <span
            class="block h-0.5 w-4 bg-ink transition-opacity duration-300"
            [class.opacity-0]="menuOpen()"
          ></span>
          <span
            class="block h-0.5 w-4 bg-ink transition-transform duration-300"
            [class.-rotate-45]="menuOpen()"
            [class.-translate-y-2]="menuOpen()"
          ></span>
        </div>
      </button>
    </div>

    @if (menuOpen()) {
    <div
      class="lg:hidden mt-2 rounded-3xl border border-ink/10 bg-white/95 backdrop-blur-md p-4 shadow-lg flex flex-col gap-1"
    >
      @for (link of links; track link.label) {
      <a
        [href]="link.href"
        class="px-3 py-2.5 rounded-xl text-sm font-medium text-ink/80 hover:bg-ink/5"
        (click)="closeMenu()"
        >{{ link.label }}</a
      >
      }
      <div class="h-px bg-ink/10 my-1"></div>
      <a
        routerLink="/login"
        class="px-3 py-2.5 rounded-xl text-sm font-semibold text-ink hover:text-accent transition-colors"
        (click)="closeMenu()"
        >Log in</a
      >
      <a
        routerLink="/register"
        class="px-3 py-2.5 rounded-xl text-sm font-semibold text-ink hover:text-accent transition-colors"
        (click)="closeMenu()"
        >Sign Up</a
      >
      <a
        href="https://vexarocouriersolutions.com/"
        target="_blank"
        rel="noopener"
        class="mt-1 flex items-center justify-center gap-2 rounded-full bg-black text-white text-sm font-semibold px-5 py-2.5 transition-colors hover:text-accent"
        (click)="closeMenu()"
      >
        Explore Platform
        <span class="inline-block">&rarr;</span>
      </a>
    </div>
    }
  </div>
</header>
