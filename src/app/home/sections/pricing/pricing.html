<section id="pricing" class="py-24 lg:py-32">
  <div class="container-custom">
    <div appReveal class="max-w-xl mb-14">
      <span class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-accent">
        <span class="h-px w-6 bg-accent"></span> Pricing
      </span>
      <h2 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight">
        Plans shaped around
        <span class="font-display italic font-medium text-accent">operating maturity.</span>
      </h2>
    </div>

    <div class="grid lg:grid-cols-3 gap-5">
      @for (plan of plans; track plan.name; let i = $index) {
        <div
          appReveal [revealDelay]="i + 1"
          class="relative rounded-3xl p-8 lg:p-9 flex flex-col transition-transform duration-500 hover:-translate-y-2"
          [class]="plan.recommended ? 'bg-ink text-paper lg:scale-[1.03] lg:shadow-2xl' : 'bg-white border border-ink/10'"
        >
          @if (plan.recommended) {
            <span class="absolute -top-3 left-8 rounded-full bg-accent text-white text-[10px] font-bold tracking-widest uppercase px-3 py-1">Recommended</span>
          }

          <h3 class="text-2xl font-extrabold">{{ plan.name }}</h3>
          <p class="mt-1 text-sm" [class]="plan.recommended ? 'text-white/50' : 'text-ink/45'">{{ plan.tagline }}</p>

          <div class="mt-6 h-px" [class]="plan.recommended ? 'bg-white/10' : 'bg-ink/10'"></div>

          <ul class="mt-6 space-y-3 flex-1">
            @for (feature of plan.features; track feature) {
              <li class="flex items-center gap-2.5 text-sm font-medium">
                <span class="h-1.5 w-1.5 rounded-full" [class]="plan.recommended ? 'bg-accent' : 'bg-ink/30'"></span>
                {{ feature }}
              </li>
            }
          </ul>

          <a
            href="#cta"
            class="mt-8 inline-flex items-center justify-center gap-2 rounded-full text-sm font-semibold px-6 py-3.5 transition-colors"
            [class]="plan.recommended ? 'bg-accent text-white hover:bg-accent/90' : (plan.name === 'Enterprise' ? 'bg-ink/10 text-ink hover:bg-ink/15' : 'bg-ink text-paper hover:bg-brand-blue')"
          >
            Talk to sales <span>&rarr;</span>
          </a>
        </div>
      }
    </div>
  </div>
</section>
